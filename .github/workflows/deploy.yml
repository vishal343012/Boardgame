name: Deploy Java App to UAT VM

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set Java Environment
        shell: powershell
        run: |
          $env:JAVA_HOME="C:\Program Files\Eclipse Adoptium\jdk-25.0.2.10-hotspot"
          $env:Path="$env:JAVA_HOME\bin;$env:Path"
          java -version

      - name: Build Maven Project
        shell: powershell
        run: |
          $env:JAVA_HOME="C:\Program Files\Eclipse Adoptium\jdk-25.0.2.10-hotspot"
          & "C:\Program Files\Apache\Maven\apache-maven-3.9.14\bin\mvn.cmd" clean package -DskipTests

      - name: Build Docker Image
        run: docker build -t boardgame-app .

      - name: Stop Old Container
        run: docker stop boardgame-app

      - name: Remove Old Container
        run: docker rm boardgame-app

      - name: Run Docker Container
        run: docker run -d -p 8080:8080 --name boardgame-app boardgame-app
